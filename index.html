        </div>
      ),
    },
    {
      id: "questionnaire2",
      section: "Questionnaire",
      content: (
        <div style={{ padding: "16px" }}>
          <h3 style={{ color: "#8B4513", margin: "0 0 4px" }}>Survey (cont.)</h3>
          <p style={{ fontSize: "11px", color: "#888", margin: "0 0 14px" }}>Questions 6–10</p>
          {[
            {q:"6. Would you use a vending machine with a built-in oven at a train station?",options:["Yes!","Maybe","No"]},
            {q:"7. Would a loyalty points system motivate you to order more?",options:["Yes","A little","No"]},
            {q:"8. Would you set up recurring (weekly) orders?",options:["Yes","Maybe","No"]},
            {q:"9. What matters most when buying bread?",options:["Freshness","Price","Convenience","Ingredients"]},
            {q:"10. Would you pay extra for home delivery?",options:["Yes","Only if free","No"]},
          ].map((item, i) => (
            <div key={i} style={{ marginBottom: "14px" }}>
              <p style={{ fontSize: "12px", fontWeight: "bold", color: "#333", margin: "0 0 6px" }}>{item.q}</p>
              <div style={{ display: "flex", flexWrap: "wrap", gap: "6px" }}>
                {item.options.map((opt) => (
                  <span key={opt} style={{ fontSize: "10px", padding: "5px 10px", borderRadius: "14px", border: "1px solid #DDD", color: "#555", background: "#FAFAFA" }}>{opt}</span>
                ))}
              </div>
            </div>
          ))}
          <div style={{ background: "#E8F5E9", borderRadius: "10px", padding: "12px", marginTop: "8px", textAlign: "center" }}>
            <p style={{ fontSize: "12px", color: "#2E7D32", margin: 0, fontWeight: "bold" }}>✅ Thank you for your answers!</p>
          </div>
        </div>
      ),
    },
  ];

  const currentData = screens[currentScreen];
  const screenTitles = {
    intro: "Introduction — Problems & Solution",
    splash: "Step 1: Splash Screen",
    onboard1: "Step 2: Onboarding — Order Anytime",
    onboard2: "Step 3: Onboarding — Pickup Lockers",
    onboard3: "Step 4: Onboarding — Earn Rewards",
    signup: "Step 5: Sign Up",
    home: "Step 6: Home Dashboard",
    menu: "Step 7: Browse Menu (Live Availability)",
    product: "Step 8: Product Details & Nutrition",
    order: "Step 9: Place Order (Locker / Delivery)",
    locker: "Step 10: Pickup Code Confirmation",
    vending: "Step 11: Vending Machines at Stations",
    rewards: "Step 12: Loyalty Rewards",
    questionnaire: "Questionnaire — Part 1",
    questionnaire2: "Questionnaire — Part 2",
  };

  return (
    <div style={{ fontFamily: "-apple-system, BlinkMacSystemFont, sans-serif", maxWidth: "420px", margin: "0 auto" }}>
      <div style={{ textAlign: "center", marginBottom: "8px" }}>
        <span style={{ fontSize: "10px", background: currentData.section === "Introduction" ? "#E3F2FD" : currentData.section === "Questionnaire" ? "#F3E5F5" : "#FFF3E0", color: currentData.section === "Introduction" ? "#1565C0" : currentData.section === "Questionnaire" ? "#6A1B9A" : "#E65100", padding: "3px 10px", borderRadius: "10px", fontWeight: "bold" }}>{currentData.section}</span>
        <span style={{ fontSize: "10px", color: "#888", marginLeft: "8px" }}>{currentScreen + 1} / {screens.length}</span>
      </div>
      <div style={{ border: "3px solid #333", borderRadius: "28px", overflow: "hidden", height: "580px", position: "relative", background: "white", boxShadow: "0 8px 30px rgba(0,0,0,0.12)" }}>
        <div style={{ background: "#F5F5F5", padding: "8px 16px", display: "flex", justifyContent: "space-between", fontSize: "10px", color: "#333" }}>
          <span>9:41</span>
          <span>📶 🔋</span>
        </div>
        <div style={{ height: "calc(100% - 30px)", overflowY: "auto" }}>{currentData.content}</div>
      </div>
      <p style={{ textAlign: "center", fontSize: "13px", fontWeight: "bold", color: "#333", margin: "12px 0 4px" }}>{screenTitles[currentData.id]}</p>
      <div style={{ display: "flex", justifyContent: "center", alignItems: "center", gap: "12px", marginTop: "8px" }}>
        <button onClick={() => setCurrentScreen(Math.max(0, currentScreen - 1))} disabled={currentScreen === 0} style={{ padding: "8px 16px", borderRadius: "8px", border: "none", background: currentScreen === 0 ? "#EEE" : "#8B4513", color: currentScreen === 0 ? "#999" : "white", fontSize: "12px", fontWeight: "bold", cursor: currentScreen === 0 ? "default" : "pointer" }}>← Back</button>
        <span style={{ fontSize: "11px", color: "#888" }}>{currentScreen + 1}/{screens.length}</span>
        <button onClick={() => setCurrentScreen(Math.min(screens.length - 1, currentScreen + 1))} disabled={currentScreen === screens.length - 1} style={{ padding: "8px 16px", borderRadius: "8px", border: "none", background: currentScreen === screens.length - 1 ? "#EEE" : "#8B4513", color: currentScreen === screens.length - 1 ? "#999" : "white", fontSize: "12px", fontWeight: "bold", cursor: currentScreen === screens.length - 1 ? "default" : "pointer" }}>Next →</button>
      </div>
      <div style={{ display: "flex", flexWrap: "wrap", justifyContent: "center", gap: "4px", marginTop: "12px" }}>
        {screens.map((s, i) => (
          <button key={i} onClick={() => setCurrentScreen(i)} style={{ width: "22px", height: "22px", borderRadius: "50%", border: "none", fontSize: "9px", background: i === currentScreen ? "#8B4513" : s.section === "Introduction" ? "#E3F2FD" : s.section === "Questionnaire" ? "#F3E5F5" : "#FFF3E0", color: i === currentScreen ? "white" : "#555", cursor: "pointer", fontWeight: i === currentScreen ? "bold" : "normal" }}>{i + 1}</button>
        ))}
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<BakeryAppFlow />);
    </script>
</body>
</html>
